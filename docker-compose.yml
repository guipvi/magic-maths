services:

  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: magicmaths
      POSTGRES_PASSWORD: d03d433ef5b95c677742dc358455e4c4
      POSTGRES_DB: magicmaths
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    ports:
      - "5555:5555"
    depends_on:
      - db
    environment:
      - DATABASE_URL=postgresql://magicmaths:d03d433ef5b95c677742dc358455e4c4@db:5432/magicmaths
      - SECRET_KEY=5d90c1b5be8c0594cf3fb754d06229037a599afd8c9b84231d52e92c14b0e896
      - JWT_SECRET_KEY=476ed638a5cd93253344d69dbec8c2fb6027ed5f471a419c9aa651df9c3e0f3d
      - FLASK_APP=run.py
      - FLASK_ENV=production

  magic-maths:
    build:
      context: ./frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  pgdata:
